<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 480" width="480" height="480">
  <defs>

    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#060E1F"/>
      <stop offset="100%" stop-color="#0C1A35"/>
    </linearGradient>

    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFD97A"/>
      <stop offset="45%" stop-color="#F5A623"/>
      <stop offset="100%" stop-color="#B87217"/>
    </linearGradient>

    <linearGradient id="goldBarFace" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#FFE58A"/>
      <stop offset="30%"  stop-color="#F5C842"/>
      <stop offset="100%" stop-color="#8C5A06"/>
    </linearGradient>

    <linearGradient id="tealGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00CFFF"/>
      <stop offset="100%" stop-color="#0088BB"/>
    </linearGradient>

    <linearGradient id="shieldFace" x1="20%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%" stop-color="#172E5A"/>
      <stop offset="100%" stop-color="#0A1A38"/>
    </linearGradient>

    <linearGradient id="outerRingGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFD97A"/>
      <stop offset="50%" stop-color="#F5A623"/>
      <stop offset="100%" stop-color="#00CFFF"/>
    </linearGradient>

    <!-- Glow filters -->
    <filter id="glowBlue" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <filter id="glowGold" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <filter id="textGlow" x="-10%" y="-30%" width="120%" height="160%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <filter id="shieldShadow" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.6"/>
    </filter>

  </defs>

  <!-- ── BACKGROUND ── -->
  <rect width="480" height="480" rx="32" fill="url(#bgGrad)"/>

  <!-- Subtle hex grid -->
  <g opacity="0.055" stroke="#00CFFF" stroke-width="0.8" fill="none">
    <polygon points="240,18 275,38 275,78 240,98 205,78 205,38"/>
    <polygon points="170,58 205,78 205,118 170,138 135,118 135,78"/>
    <polygon points="310,58 345,78 345,118 310,138 275,118 275,78"/>
    <polygon points="240,98 275,118 275,158 240,178 205,158 205,118"/>
    <polygon points="170,138 205,158 205,198 170,218 135,198 135,158"/>
    <polygon points="310,138 345,158 345,198 310,218 275,198 275,158"/>
    <polygon points="240,178 275,198 275,238 240,258 205,238 205,198"/>
    <polygon points="170,218 205,238 205,278 170,298 135,278 135,238"/>
    <polygon points="310,218 345,238 345,278 310,298 275,278 275,238"/>
    <polygon points="240,258 275,278 275,318 240,338 205,318 205,278"/>
    <polygon points="100,98 135,118 135,158 100,178 65,158 65,118"/>
    <polygon points="380,98 415,118 415,158 380,178 345,158 345,118"/>
    <polygon points="100,178 135,198 135,238 100,258 65,238 65,198"/>
    <polygon points="380,178 415,198 415,238 380,258 345,238 345,198"/>
    <polygon points="100,258 135,278 135,318 100,338 65,318 65,278"/>
    <polygon points="380,258 415,278 415,318 380,338 345,318 345,278"/>
    <polygon points="170,298 205,318 205,358 170,378 135,358 135,318"/>
    <polygon points="310,298 345,318 345,358 310,378 275,358 275,318"/>
    <polygon points="240,338 275,358 275,398 240,418 205,398 205,358"/>
  </g>

  <!-- ════════════════════════════════════════ -->
  <!--   MAIN ICON MARK — centred at 240, 210  -->
  <!-- ════════════════════════════════════════ -->
  <g transform="translate(240, 210)">

    <!-- Outer glow pulse ring -->
    <circle cx="0" cy="0" r="158" fill="none" stroke="#00CFFF"
            stroke-width="1" opacity="0.12" filter="url(#glowBlue)"/>

    <!-- Outer decorative hex ring (thin, teal) -->
    <polygon
      points="0,-148 128.2,-74 128.2,74 0,148 -128.2,74 -128.2,-74"
      fill="none" stroke="url(#outerRingGrad)" stroke-width="1.5" opacity="0.4"/>

    <!-- Inner hex ring (structural) -->
    <polygon
      points="0,-130 112.6,-65 112.6,65 0,130 -112.6,65 -112.6,-65"
      fill="none" stroke="url(#tealGrad)" stroke-width="3"
      opacity="0.9" filter="url(#glowBlue)"/>

    <!-- Hex vertex nodes -->
    <circle cx="0"      cy="-130" r="6" fill="#00CFFF" opacity="0.9" filter="url(#glowBlue)"/>
    <circle cx="112.6"  cy="-65"  r="6" fill="#00CFFF" opacity="0.9" filter="url(#glowBlue)"/>
    <circle cx="112.6"  cy="65"   r="6" fill="#00CFFF" opacity="0.9" filter="url(#glowBlue)"/>
    <circle cx="0"      cy="130"  r="6" fill="#00CFFF" opacity="0.9" filter="url(#glowBlue)"/>
    <circle cx="-112.6" cy="65"   r="6" fill="#00CFFF" opacity="0.9" filter="url(#glowBlue)"/>
    <circle cx="-112.6" cy="-65"  r="6" fill="#00CFFF" opacity="0.9" filter="url(#glowBlue)"/>

    <!-- Hex edge midpoint tick marks -->
    <g stroke="#00CFFF" stroke-width="2" opacity="0.4">
      <line x1="56.3" y1="-97.5" x2="64" y2="-111"/>
      <line x1="112.6" y1="0" x2="129" y2="0"/>
      <line x1="56.3" y1="97.5" x2="64" y2="111"/>
      <line x1="-56.3" y1="97.5" x2="-64" y2="111"/>
      <line x1="-112.6" y1="0" x2="-129" y2="0"/>
      <line x1="-56.3" y1="-97.5" x2="-64" y2="-111"/>
    </g>

    <!-- SHIELD BODY -->
    <path d="M0,-105 L88,-62 L88,18 Q88,84 0,112 Q-88,84 -88,18 L-88,-62 Z"
          fill="url(#shieldFace)"
          stroke="url(#goldGrad)" stroke-width="3"
          filter="url(#shieldShadow)"/>

    <!-- Shield inner bevel highlight -->
    <path d="M0,-96 L78,-56 L78,18 Q78,76 0,100"
          fill="none" stroke="#FFD97A" stroke-width="0.8" opacity="0.25"/>

    <!-- ── GOLD BAR (centre-left) ── -->
    <g transform="translate(-32, 26)" filter="url(#glowGold)">
      <!-- Bar face -->
      <polygon points="-30,-12 30,-12 25,12 -25,12" fill="url(#goldBarFace)"/>
      <!-- Top bevel -->
      <polygon points="-30,-12 30,-12 25,-7 -25,-7" fill="#FFE890" opacity="0.5"/>
      <!-- Right side bevel -->
      <polygon points="25,-7 30,-12 30,12 25,12" fill="#7A4800" opacity="0.55"/>
      <!-- Shine streak -->
      <line x1="-20" y1="-9" x2="18" y2="-9"
            stroke="white" stroke-width="2" stroke-opacity="0.45" stroke-linecap="round"/>
      <!-- Second bar (shadow behind) -->
      <polygon points="-28,12 28,12 23,22 -23,22" fill="#C88A10" opacity="0.5"/>
      <polygon points="23,12 28,12 28,22 23,22" fill="#5A3300" opacity="0.4"/>
    </g>

    <!-- ── OIL DROP (top centre) ── -->
    <g transform="translate(0,-52)" filter="url(#glowBlue)">
      <path d="M0,-32 C14,-16 22,-4 22,8 C22,24 12,34 0,34 C-12,34 -22,24 -22,8 C-22,-4 -14,-16 0,-32 Z"
            fill="#00CFFF" opacity="0.85"/>
      <!-- Specular highlight -->
      <ellipse cx="-6" cy="4" rx="7" ry="11" fill="white" opacity="0.18" transform="rotate(-20,-6,4)"/>
      <!-- Small inner shine dot -->
      <circle cx="-8" cy="-4" r="3" fill="white" opacity="0.22"/>
    </g>

    <!-- ── RISING BAR CHART / STOCKS (right side) ── -->
    <g transform="translate(46, 16)">
      <!-- Bar 1 (short) -->
      <rect x="-28" y="12" width="12" height="20" rx="2"
            fill="#00CFFF" opacity="0.5" filter="url(#glowBlue)"/>
      <!-- Bar 2 (medium) -->
      <rect x="-10" y="2" width="12" height="30" rx="2"
            fill="#00CFFF" opacity="0.7" filter="url(#glowBlue)"/>
      <!-- Bar 3 (tall — glowing) -->
      <rect x="8" y="-12" width="12" height="44" rx="2"
            fill="#00CFFF" opacity="0.95" filter="url(#glowBlue)"/>
      <!-- Up arrow above tallest bar -->
      <polygon points="14,-16 20,-24 26,-16" fill="#00CFFF" filter="url(#glowBlue)"/>
    </g>

  </g>
  <!-- End icon mark -->


  <!-- ════════════════════════════════════════ -->
  <!--          WORDMARK  (lower section)        -->
  <!-- ════════════════════════════════════════ -->

  <!-- Thin horizontal gold rule above wordmark -->
  <line x1="80" y1="355" x2="400" y2="355" stroke="url(#goldGrad)" stroke-width="1" opacity="0.35"/>

  <!-- "RWA" primary text -->
  <text x="240" y="410"
        text-anchor="middle"
        font-family="'Arial Black', 'Impact', 'Helvetica Neue', Arial, sans-serif"
        font-weight="900"
        font-size="78"
        letter-spacing="12"
        fill="url(#goldGrad)"
        filter="url(#textGlow)">RWA</text>

  <!-- "COLLATERAL" subtitle -->
  <text x="240" y="445"
        text-anchor="middle"
        font-family="'Helvetica Neue', Arial, sans-serif"
        font-weight="300"
        font-size="18"
        letter-spacing="11"
        fill="#00CFFF"
        opacity="0.9"
        filter="url(#glowBlue)">COLLATERAL</text>

  <!-- Bottom thin rule -->
  <line x1="80" y1="458" x2="400" y2="458" stroke="url(#tealGrad)" stroke-width="0.8" opacity="0.3"/>

</svg>
